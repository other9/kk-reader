name: Fetch RSS feeds

on:
  schedule:
    # 2時間ごとに実行(UTC)。
    # update-012: HH:00 は全世界の cron が殺到する混雑帯のため
    # 実測でしばしばスキップ・大幅遅延が発生していた。HH:07 にずらす
    # ことでキューイング遅延を緩和する(GitHub Actions コミュニティの
    # 既知 mitigation: minute 0/15/30/45 を避ける)。
    - cron: "7 */2 * * *"
  workflow_dispatch: # 手動実行を許可
  push:
    paths:
      - "opml/subscriptions.opml"
      - "scripts/**"
      - ".github/workflows/fetch-feeds.yml"

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: fetch-feeds
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build feeds.json from OPML (if missing or OPML changed)
        run: |
          if [ ! -f docs/data/feeds.json ] || [ opml/subscriptions.opml -nt docs/data/feeds.json ]; then
            echo "OPMLが新しいか、feeds.jsonが存在しないため再構築します"
            python scripts/opml_to_feeds.py
          else
            echo "feeds.json は最新です"
          fi

      - name: Fetch all feeds
        # update-009: feeds.json で `via_worker: true` のフィードは
        # Cloudflare Worker /fetch 経由で取得する。WORKER_TOKEN は
        # Repository Secret として設定する(初期値は SYNC_SECRET と同値)。
        env:
          WORKER_BASE_URL: "https://kk-sync.other9.workers.dev"
          WORKER_TOKEN: ${{ secrets.WORKER_TOKEN }}
        run: python scripts/fetch_feeds.py

      - name: Commit updated data
        # update-018: cron 中に user push が入ると bot の git push が
        # non-fast-forward で reject されるレース条件への対策。
        #
        # 戦略:
        #   1. 通常 push を試行
        #   2. reject されたらデータファイルを一時退避 → remote を fetch
        #      → 自分の commit を捨てて remote 最新に reset → データファイル
        #      を復元 → 再 commit + push
        #   3. 最大 3 回試行
        #
        # データファイル(feeds.json / articles.json)は bot の生成内容が
        # 常に「現時点の真」なので、conflict 時は bot 側を採用する設計。
        # user が code 変更を push していた場合は reset --hard origin/main
        # で取り込まれるため、それらは保持される。
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/feeds.json docs/data/articles.json
          if git diff --cached --quiet; then
            echo "変更なし"
            exit 0
          fi
          git commit -m "chore: update feeds [skip ci]"

          for attempt in 1 2 3; do
            if git push; then
              echo "push 成功 (attempt $attempt)"
              exit 0
            fi
            echo "push reject (attempt $attempt/3)、remote と同期して再試行"

            # 自分のデータファイルを退避
            cp docs/data/feeds.json /tmp/feeds.json.bot
            cp docs/data/articles.json /tmp/articles.json.bot

            # remote の最新を取り込む(自分の commit は消える)
            git fetch origin main
            git reset --hard origin/main

            # 自分のデータファイルで上書き(bot 生成が真)
            cp /tmp/feeds.json.bot docs/data/feeds.json
            cp /tmp/articles.json.bot docs/data/articles.json

            git add docs/data/feeds.json docs/data/articles.json
            if git diff --cached --quiet; then
              echo "remote と同一内容、push 不要"
              exit 0
            fi
            git commit -m "chore: update feeds [skip ci]"
          done
          echo "3 回試行しても push できず、諦める(次の cron で再試行されます)"
          exit 1
