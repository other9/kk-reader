name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/data/**"
      - "*.md"
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements.txt
      - name: Ruff lint
        run: ruff check .
      - name: Pytest
        run: pytest tests/ --tb=short
