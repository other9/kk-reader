<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<meta name="theme-color" content="#ffffff">
<title>kk reader</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body data-theme="auto" data-mobile-view="list">

<header class="topbar">
  <div class="topbar-row topbar-main">
    <div class="topbar-left">
      <button class="icon-btn icon-only" id="toggle-sidebar" title="サイドバー" aria-label="サイドバー">≡</button>
      <h1 class="brand">kk <span class="brand-dim">reader</span></h1>
    </div>
    <div class="topbar-right">
      <button class="filter-pill" id="filter-unread" data-active="true" title="未読のみ (u)">未読</button>
      <button class="filter-pill icon-only" id="filter-fav" title="お気に入りのみ (s)" aria-label="お気に入り">★</button>
      <button class="icon-btn" id="mark-all-read" title="表示中をすべて既読 (Shift+M)">既読化</button>
      <button class="icon-btn icon-only" id="theme-toggle" title="テーマ切替" aria-label="テーマ">◐</button>
      <button class="icon-btn icon-only" id="open-settings" title="同期設定" aria-label="設定">
        <span id="sync-badge" data-state="off">⚙</span>
      </button>
      <span class="status" id="status"></span>
    </div>
  </div>
  <div class="topbar-row topbar-search">
    <input type="search" id="search" placeholder="検索（タイトル・ソース・カテゴリ）" autocomplete="off">
  </div>
</header>

<div class="sidebar-backdrop" id="sidebar-backdrop"></div>

<main class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-head">概要</div>
      <button class="cat-row top-row" data-cat="__all" data-active="true">
        <span class="cat-name">すべて</span>
        <span class="cat-count" id="count-all">0</span>
      </button>
      <button class="cat-row top-row" data-cat="__fav">
        <span class="cat-name">★ お気に入り</span>
        <span class="cat-count" id="count-fav">0</span>
      </button>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-head">カテゴリ・ソース</div>
      <div id="category-list"></div>
    </div>
    <div class="sidebar-section sidebar-foot">
      <div class="sidebar-head">ステータス</div>
      <div id="fetch-status" class="fetch-status">未取得</div>
      <div class="hint">2時間ごとに自動取得</div>
    </div>
  </aside>

  <section class="article-list" id="article-list">
    <div class="list-empty" id="list-empty">読み込み中…</div>
  </section>

  <section class="article-detail" id="article-detail">
    <div class="detail-mobile-header">
      <button class="icon-btn" id="back-to-list" title="一覧に戻る" aria-label="戻る">←</button>
      <span class="detail-mobile-title" id="detail-mobile-title"></span>
    </div>
    <div class="detail-content" id="detail-content">
      <div class="detail-empty">記事を選択してください</div>
    </div>
  </section>
</main>

<template id="tpl-article-row">
  <article class="row" tabindex="0">
    <div class="row-meta">
      <span class="row-source"></span>
      <span class="row-cat"></span>
      <span class="row-date"></span>
    </div>
    <h3 class="row-title"></h3>
    <p class="row-summary"></p>
    <div class="row-actions">
      <button class="row-fav" title="お気に入り (f)" aria-label="お気に入り">☆</button>
      <button class="row-read" title="既読/未読切替 (m)" aria-label="既読切替">●</button>
    </div>
  </article>
</template>

<template id="tpl-cat-row">
  <button class="cat-row">
    <span class="cat-caret"></span>
    <span class="cat-name"></span>
    <span class="cat-count"></span>
  </button>
</template>

<template id="tpl-feed-row">
  <button class="feed-row">
    <span class="feed-name"></span>
    <span class="feed-count"></span>
  </button>
</template>

<div class="shortcuts-hint" id="shortcuts-hint">
  <kbd>j</kbd>/<kbd>k</kbd> 移動 · <kbd>m</kbd> 既読切替 · <kbd>f</kbd> お気に入り · <kbd>o</kbd> 元記事 · <kbd>u</kbd> 未読のみ
</div>

<!-- ================ 設定モーダル ================ -->
<div class="settings-modal" id="settings-modal">
  <div class="settings-backdrop" id="settings-backdrop"></div>
  <div class="settings-panel">
    <div class="settings-head">
      <h2>同期設定</h2>
      <button class="icon-btn icon-only" id="close-settings" aria-label="閉じる">×</button>
    </div>
    <div class="settings-body">
      <p class="settings-intro">
        Cloudflare Worker 経由で複数端末間の既読・お気に入り状態を同期します。
        最初に PC で生成した token を3端末すべてで同じ値に設定してください。
      </p>

      <div class="settings-field">
        <label for="sync-url-input">Worker URL</label>
        <input type="text" id="sync-url-input" placeholder="https://kk-sync.other9.workers.dev" autocomplete="off">
        <div class="field-hint">通常は変更不要(デフォルトのまま)</div>
      </div>

      <div class="settings-field">
        <label for="sync-token-input">Sync Token</label>
        <input type="password" id="sync-token-input" placeholder="32文字以上のランダム文字列" autocomplete="off" spellcheck="false">
        <div class="field-hint">PCで <code>openssl rand -hex 32</code> 等で生成した値を貼り付け</div>
      </div>

      <div class="settings-actions">
        <button class="icon-btn" id="sync-test">接続テスト</button>
        <button class="icon-btn primary" id="sync-save">保存して同期</button>
        <button class="icon-btn danger" id="sync-clear">同期を解除</button>
      </div>

      <div class="settings-message" id="sync-message"></div>

      <div class="settings-status">
        <div class="settings-status-label">現在の状態</div>
        <div id="sync-status-display">未設定</div>
      </div>
    </div>
  </div>
</div>

<script src="sync.js"></script>
<script src="app.js"></script>
</body>
</html>
