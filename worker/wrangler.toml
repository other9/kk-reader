#:schema node_modules/wrangler/config-schema.json
name = "kk-sync"
main = "worker.js"
compatibility_date = "2026-05-06"

# KV namespace の id は `wrangler kv namespace create STATE` 実行後に得られる値で書き換える。
# 実行例の出力:
#   { binding = "STATE", id = "<32文字の英数字>" }
[[kv_namespaces]]
binding = "STATE"
id = "bcc0dd025aa34897b44a83f13ce88973"

# 観測性(無料、推奨)
[observability]
enabled = true
